name: Backend Tests

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/backend-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: brewbar_root
          MYSQL_DATABASE: brewbar_test
          MYSQL_USER: brewbar
          MYSQL_PASSWORD: brewbar_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore server/BrewBar.slnx

      - name: Build
        run: dotnet build server/BrewBar.slnx --no-restore --configuration Release

      - name: Run unit tests
        run: dotnet test server/tests/BrewBar.Tests.Unit/ --no-build --configuration Release --logger "trx;LogFileName=unit-results.trx" --collect:"XPlat Code Coverage"

      - name: Run integration tests
        run: dotnet test server/tests/BrewBar.Tests.Integration/ --no-build --configuration Release --logger "trx;LogFileName=integration-results.trx" --collect:"XPlat Code Coverage"
        env:
          ConnectionStrings__DefaultConnection: "Server=localhost;Port=3306;Database=brewbar_test;User=brewbar;Password=brewbar_test;"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: server/tests/**/TestResults/*.trx

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: server/tests/**/TestResults/**/coverage.cobertura.xml
          retention-days: 14
