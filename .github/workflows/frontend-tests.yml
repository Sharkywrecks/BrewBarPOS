name: Frontend Tests

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - '.github/workflows/frontend-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'client/**'
      - '.github/workflows/frontend-tests.yml'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Lint
        working-directory: client
        run: npx ng lint

  build:
    name: "Build – ${{ matrix.project }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [admin, pos]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Build ${{ matrix.project }}
        working-directory: client
        run: npx ng build ${{ matrix.project }} --configuration production

  test:
    name: "Test – ${{ matrix.project }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [admin, pos, printing, auth, sync, api-client, shared-models, ui]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Run tests (${{ matrix.project }})
        working-directory: client
        run: npx ng test --project ${{ matrix.project }} --watch=false --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.project }}
          path: client/coverage/
          retention-days: 14

  # Gate – all lint, build, and test jobs must pass
  all-frontend-checks:
    name: All Frontend Checks Passed
    needs: [lint, build, test]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "Lint failed."
            exit 1
          fi
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "Build failed."
            exit 1
          fi
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "One or more test suites failed."
            exit 1
          fi
          echo "All frontend checks passed."
