# GitHub Actions – E2E Tests (Playwright)
#
# Runs smoke tests on PRs, full regression nightly.
# Requires both the .NET API and Angular POS app to be running.

name: E2E Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'client/**'
      - 'server/**'
      - '.github/workflows/e2e-tests.yml'
  schedule:
    # Nightly at 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test grep filter (e.g. @smoke or @regression)'
        required: false
        default: '@smoke'

jobs:
  e2e:
    name: E2E – POS (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Install Playwright browsers
        working-directory: client
        run: npx playwright install --with-deps chromium

      - name: Build API
        run: dotnet build server/BrewBar.slnx -c Release

      - name: Start API (SQLite)
        run: |
          nohup dotnet run --project server/src/BrewBar.API/BrewBar.API.csproj \
            --no-build -c Release --environment Desktop \
            > "$RUNNER_TEMP/api.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/api.pid"
        env:
          ASPNETCORE_URLS: http://localhost:5000

      - name: Wait for API health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/api/categories > /dev/null 2>&1; then
              echo "API is ready."
              exit 0
            fi
            sleep 2
          done
          echo "API failed to start."
          cat "$RUNNER_TEMP/api.log" || true
          exit 1

      - name: Build POS app
        working-directory: client
        run: npx ng build pos --configuration production

      - name: Serve POS build
        run: npx serve client/dist/pos/browser -l 4201 --no-clipboard &

      - name: Wait for POS server
        run: npx wait-on http://localhost:4201 --timeout 30000

      - name: Determine test filter
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "grep=" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "grep=${{ github.event.inputs.suite }}" >> $GITHUB_OUTPUT
          else
            echo "grep=@smoke" >> $GITHUB_OUTPUT
          fi

      - name: Run E2E tests
        working-directory: client
        run: npx playwright test --config e2e/playwright.config.ts ${{ steps.filter.outputs.grep && format('--grep "{0}"', steps.filter.outputs.grep) || '' }}
        env:
          E2E_BASE_URL: http://localhost:4201
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: client/playwright-report/
          retention-days: 14

      - name: Upload API logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-logs
          path: ${{ runner.temp }}/api.log
