# GitHub Actions – Security Audit
#
# Checks npm and .NET dependencies for known vulnerabilities.
# Fails on high or critical severity issues.

name: Security Audit

on:
  push:
    branches: [main]
    paths:
      - '**/package-lock.json'
      - '**/*.csproj'
  pull_request:
    branches: [main]
    paths:
      - '**/package-lock.json'
      - '**/*.csproj'
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 09:00 UTC

jobs:
  audit-client:
    name: Audit – Client (npm)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high + critical)
        run: npm audit --audit-level=high

  audit-dotnet:
    name: Audit – .NET
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore packages
        run: dotnet restore server/BrewBar.slnx

      - name: Check vulnerable packages
        run: |
          dotnet list server/BrewBar.slnx package --vulnerable --include-transitive 2>&1 | tee audit-output.txt
          if grep -qi "has the following vulnerable packages" audit-output.txt; then
            echo "::error::Vulnerable .NET packages detected"
            exit 1
          fi
