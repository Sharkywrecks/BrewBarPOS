services:
  mysql:
    image: mysql:8
    container_name: brewbar-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: brewbar_root
      MYSQL_DATABASE: brewbar
      MYSQL_USER: brewbar
      MYSQL_PASSWORD: brewbar_dev
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: brewbar-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
